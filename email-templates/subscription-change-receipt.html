<!--
  EmailJS: EMAILJS_TEMPLATE_ID_SUBSCRIPTION_CHANGE_RECEIPT
  Vercel env: EMAILJS_TEMPLATE_ID_SUBSCRIPTION_CHANGE_RECEIPT=<template id from EmailJS dashboard>

  Params: to_email, change_summary, line_items_html, total_amount, amount_status_line,
          proration_note, invoice_id, manage_billing_url, logo_url

  Recommended EmailJS subject:
    Receipt: BizziCloud subscription updated — {{total_amount}}

  In EmailJS: set "To Email" to {{to_email}}
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription updated</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #1e293b; max-width: 600px; margin: 0 auto; padding: 24px; background: #f8fafc; }
    .card { background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .logo { margin-bottom: 20px; }
    .logo img { height: 48px; }
    h1 { font-size: 1.35rem; margin: 0 0 12px; color: #0f172a; }
    .summary { font-size: 15px; color: #475569; margin-bottom: 20px; }
    .amount-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 16px 18px; margin: 20px 0; }
    .amount-box strong { font-size: 1.15rem; color: #166534; display: block; margin-bottom: 6px; }
    .lines { margin: 24px 0; overflow-x: auto; }
    .note { font-size: 13px; color: #64748b; margin-top: 16px; }
    .meta { font-size: 13px; color: #94a3b8; margin-top: 8px; }
    .cta { display: inline-block; background: #0ea5e9; color: #fff !important; padding: 12px 22px; text-decoration: none; border-radius: 8px; font-weight: 600; margin-top: 20px; }
    .footer { font-size: 12px; color: #94a3b8; margin-top: 32px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="{{logo_url}}" alt="BizziCloud" />
    </div>
    <h1>Your subscription was updated</h1>
    <p class="summary">{{change_summary}}</p>
    <div class="amount-box">
      <strong>Total: {{total_amount}}</strong>
      <span>{{amount_status_line}}</span>
    </div>
    <p class="note">{{proration_note}}</p>
    <div class="lines">
      {{line_items_html}}
    </div>
    <p class="meta">Reference: Invoice {{invoice_id}}</p>
    <a class="cta" href="{{manage_billing_url}}">Manage billing</a>
    <p class="footer">This is an automated receipt for your records. If you did not make this change, contact support immediately.</p>
  </div>
</body>
</html>
