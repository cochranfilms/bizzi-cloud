<!DOCTYPE html>
<html lang="en">
<!--
  EmailJS Support Ticket Template
  Sent TO: Your support email (set in EmailJS dashboard)
  Subject (set in dashboard): [BizziCloud Support] {{subject}}

  Variables: subject, message, user_email, user_name, user_id, priority, issue_type, created_at, logo_url
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Ticket - {{subject}}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 24px; }
    .logo { margin-bottom: 24px; }
    .logo img { height: 48px; }
    h1 { font-size: 1.25rem; margin-bottom: 16px; }
    .meta { display: flex; flex-wrap: wrap; gap: 12px 24px; margin-bottom: 20px; font-size: 13px; color: #64748b; }
    .meta strong { color: #334155; }
    .ticket-box { background: #f8fafc; border-radius: 12px; padding: 20px; margin: 20px 0; white-space: pre-wrap; }
    .footer { font-size: 12px; color: #64748b; margin-top: 32px; }
  </style>
</head>
<body>
  <div class="logo">
    <img src="{{logo_url}}" alt="BizziCloud" />
  </div>
  <h1>Support ticket: {{subject}}</h1>

  <div class="meta">
    <span><strong>From:</strong> {{user_name}} &lt;{{user_email}}&gt;</span>
    <span><strong>Priority:</strong> {{priority}}</span>
    <span><strong>Type:</strong> {{issue_type}}</span>
    <span><strong>User ID:</strong> {{user_id}}</span>
    <span><strong>Submitted:</strong> {{created_at}}</span>
  </div>

  <p><strong>Message:</strong></p>
  <div class="ticket-box">{{message}}</div>

  <div class="footer">
    <p>BizziCloud · This ticket was submitted via the user dashboard</p>
  </div>
</body>
</html>
