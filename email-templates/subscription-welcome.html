<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to BizziCloud</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 24px; }
    .logo { margin-bottom: 24px; }
    .logo img { display: block; width: auto; height: auto; max-width: 48px; max-height: 48px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { margin: 0 0 16px; }
    .subscription-box { background: #f8fafc; border-radius: 8px; padding: 20px; margin: 24px 0; }
    .subscription-box p { margin: 4px 0; }
    .cta { display: inline-block; background: #00BFFF; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: 600; margin: 16px 0; }
    .cta:hover { background: #00D4FF; }
    .footer { font-size: 12px; color: #64748b; margin-top: 32px; }
  </style>
</head>
<body>
  <div class="logo">
    <img src="{{logo_url}}" alt="BizziCloud" width="41" height="50" style="display:block;width:auto;height:auto;max-width:48px;max-height:48px;border:0;outline:none;text-decoration:none;" />
  </div>
  <h1>Welcome to BizziCloud!</h1>
  <p>{{greeting_line}}</p>
  <p>{{intro_paragraph}}</p>
  <div class="subscription-box">
    <p><strong>{{plan_name}}</strong></p>
    <p>{{storage_line}}</p>
    <p>{{seats_line}}</p>
    {{{addons_block}}}
    <p style="margin-top: 12px;"><strong>{{amount}}</strong></p>
  </div>
  <p>
    <a href="{{cta_url}}" class="cta">{{cta_text}}</a>
  </p>
  <p>{{footer_paragraph}}</p>
  <div class="footer">
    <p>BizziCloud · Storage &amp; Collaboration</p>
  </div>
</body>
</html>
