<!DOCTYPE html>
<html lang="en">
<!--
  EmailJS: EMAILJS_TEMPLATE_ID_WAITLIST_ADMIN
  Env: WAITLIST_ADMIN_NOTIFY_EMAIL — passed as {{admin_email}}; set EmailJS "To" to {{admin_email}}.

  Recommended subject: [Bizzi Cloud] New waitlist pre-registration — {{full_name}}

  Variables: admin_email, full_name, submitter_email, submission_details_html, submitted_at_formatted, logo_url
  Use triple braces for the details block: {{{submission_details_html}}}
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New waitlist submission</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #334155; max-width: 600px; margin: 0 auto; padding: 24px; background: #f1f5f9; }
    .shell { background: #ffffff; border-radius: 16px; padding: 28px; border: 1px solid #e2e8f0; }
    .logo { margin-bottom: 20px; }
    .logo img { display: block; width: auto; height: auto; max-width: 48px; max-height: 48px; }
    h1 { font-size: 1.25rem; margin: 0 0 8px; color: #0f172a; }
    .lede { font-size: 14px; color: #64748b; margin-bottom: 20px; }
    .meta { font-size: 13px; color: #64748b; margin-bottom: 20px; padding: 12px 16px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0; }
    .footer { font-size: 12px; color: #94a3b8; margin-top: 28px; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="logo">
      <img src="{{logo_url}}" alt="Bizzi Cloud" width="41" height="50" style="display:block;width:auto;height:auto;max-width:48px;max-height:48px;border:0;outline:none;text-decoration:none;" />
    </div>
    <h1>New waitlist pre-registration</h1>
    <p class="lede"><strong>{{full_name}}</strong> just submitted the waitlist form.</p>
    <div class="meta">
      <strong>Submitter email:</strong> {{submitter_email}}<br />
      <strong>Recorded:</strong> {{submitted_at_formatted}}
    </div>
    {{{submission_details_html}}}
    <div class="footer">
      <p>Bizzi Cloud · Internal waitlist notification</p>
    </div>
  </div>
</body>
</html>
